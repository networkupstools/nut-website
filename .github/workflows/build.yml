name: Build NUT Website

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI_AUTOCOMMIT: "false"
      CI_AUTOPUSH: "false"
      CI_AVOID_RESPIN: "false"
      PYTHON: "/usr/bin/env python3"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            asciidoc \
            xsltproc \
            dblatex \
            docbook-xsl \
            docbook-xsl-ns \
            source-highlight \
            libxml2-utils \
            aspell \
            aspell-en \
            autoconf \
            automake \
            libtool \
            make \
            python3 \
            python3-lxml \
            python3-simplejson \
            python3-pycparser

      - name: Build website
        run: bash ./ci_build.sh

      - name: Upload generated site
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-output
          path: output/
